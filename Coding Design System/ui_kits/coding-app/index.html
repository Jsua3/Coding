<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Coding — App</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="data.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="AppShell.jsx"></script>
<script type="text/babel" src="LoginScreen.jsx"></script>
<script type="text/babel" src="DashboardScreen.jsx"></script>
<script type="text/babel" src="CourseScreen.jsx"></script>
<script type="text/babel" src="LessonScreen.jsx"></script>
<script type="text/babel">
function App() {
  const data = window.CODING_DATA;
  const [screen, setScreen] = React.useState(localStorage.getItem("coding-kit-screen") || "login");
  const [tab, setTab] = React.useState("inicio");
  const go = (s) => { setScreen(s); localStorage.setItem("coding-kit-screen", s); };
  if (screen === "login") return <LoginScreen onLogin={() => go("dashboard")} />;
  if (screen === "course") return <CourseScreen data={data} tab={tab} setTab={setTab} onBack={() => go("dashboard")} onOpenLesson={() => go("lesson")} />;
  if (screen === "lesson") return <LessonScreen data={data} tab={tab} setTab={setTab} onBack={() => go("course")} />;
  return <DashboardScreen data={data} tab={tab} setTab={setTab} onOpenCourse={() => go("course")} />;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
