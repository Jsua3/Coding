<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Formularios</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body { padding: 20px; } .row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; } .col { display: flex; flex-direction: column; gap: 14px; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Button, IconButton, Input, Select, Checkbox, Radio, Switch } = window.CodingDesignSystem_2ecb3a;
function SearchIcon() {
  return <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" strokeWidth="1.8"/><path d="M10.5 10.5L14 14" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/></svg>;
}
function Demo() {
  const [v, setV] = React.useState("bd1");
  const [c, setC] = React.useState(true);
  const [r, setR] = React.useState(0);
  const [s, setS] = React.useState(true);
  return (
    <div className="col">
      <div className="row">
        <Button variant="primary">Continuar leccion</Button>
        <Button variant="secondary">Ver temario</Button>
        <Button variant="ghost">Omitir</Button>
        <Button variant="danger">Reiniciar</Button>
        <Button variant="primary" disabled>Deshabilitado</Button>
      </div>
      <div className="row">
        <Button size="sm" variant="secondary">Pequeno 36</Button>
        <Button size="md" variant="secondary">Mediano 44</Button>
        <Button size="lg" variant="secondary">Grande 52</Button>
        <IconButton label="Buscar"><SearchIcon /></IconButton>
        <IconButton label="Buscar" variant="accent"><SearchIcon /></IconButton>
        <IconButton label="Buscar" variant="ghost"><SearchIcon /></IconButton>
      </div>
      <div className="row" style={{ alignItems: "flex-start" }}>
        <Input label="Correo" placeholder="tu@universidad.edu" hint="Usa tu correo institucional" style={{ width: 240 }} iconLeft={<SearchIcon />} />
        <Input label="Contrasena" type="password" error="Minimo 8 caracteres" style={{ width: 200 }} />
        <Select label="Materia" value={v} onChange={setV} style={{ width: 200 }} options={[
          { value: "bd1", label: "Bases de datos I" },
          { value: "prog2", label: "Programacion II" },
          { value: "algo", label: "Algoritmos" },
        ]} />
      </div>
      <div className="row" style={{ gap: 24 }}>
        <Checkbox checked={c} onChange={setC} label="Leccion completada" />
        <Radio name="d" checked={r === 0} onChange={() => setR(0)} label="Opcion A" />
        <Radio name="d" checked={r === 1} onChange={() => setR(1)} label="Opcion B" />
        <Switch checked={s} onChange={setS} label="Notificaciones" />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
