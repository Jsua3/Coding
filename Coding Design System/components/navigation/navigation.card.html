<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Navegacion</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body { padding: 20px; } .row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; } .col { display: flex; flex-direction: column; gap: 14px; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Tabs } = window.CodingDesignSystem_2ecb3a;
function Demo() {
  const [a, setA] = React.useState("temario");
  const [b, setB] = React.useState("todos");
  return (
    <div className="col" style={{ maxWidth: 560 }}>
      <Tabs value={a} onChange={setA} items={[
        { id: "temario", label: "Temario" },
        { id: "notas", label: "Notas" },
        { id: "progreso", label: "Progreso" },
      ]} />
      <Tabs size="sm" value={b} onChange={setB} items={[
        { id: "todos", label: "Todos" },
        { id: "curso", label: "En curso" },
        { id: "done", label: "Completados" },
        { id: "nuevos", label: "Nuevos" },
      ]} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
