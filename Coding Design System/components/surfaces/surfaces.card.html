<body>
<div id="root"></div>
<script type="text/babel">
const { GlassPanel, Card, Badge, Progress } = window.CodingDesignSystem_2ecb3a;
function Demo() {
  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16 }}>
      <GlassPanel strength="subtle" padding="18px"><div style={{ fontSize: 13, color: "var(--text-secondary)" }}>subtle</div></GlassPanel>
      <GlassPanel padding="18px"><div style={{ fontSize: 13, color: "var(--text-secondary)" }}>default</div></GlassPanel>
      <GlassPanel strength="strong" padding="18px"><div style={{ fontSize: 13, color: "var(--text-secondary)" }}>strong</div></GlassPanel>
      <GlassPanel tint="blue" padding="18px"><div style={{ fontSize: 13, color: "#A3C0E8" }}>tint blue</div></GlassPanel>
      <GlassPanel tint="cyan" padding="18px"><div style={{ fontSize: 13, color: "#9CDCD2" }}>tint cyan</div></GlassPanel>
      <GlassPanel tint="violet" padding="18px"><div style={{ fontSize: 13, color: "#C2BCE8" }}>tint violet</div></GlassPanel>
      <div style={{ gridColumn: "1 / -1", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
        <Card eyebrow="Bases de datos I" title="Modelo relacional" subtitle="12 lecciones · 4 h" tint="cyan" footer={<Badge tone="cyan" dot>EN CURSO</Badge>}>
          <Progress value={68} tone="cyan" showLabel />
        </Card>
        <Card eyebrow="Programacion II" title="Herencia y polimorfismo" subtitle="9 lecciones · 3 h" footer={<Badge tone="blue">NUEVO</Badge>}>
          <Progress value={12} tone="blue" showLabel />

  );
