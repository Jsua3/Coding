<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
body { padding: 18px 20px; overflow: hidden; }
.row { display: flex; align-items: center; gap: 12px; margin-bottom: 7px; } .bar { height: 12px; border-radius: 99px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan)); box-shadow: 0 0 10px rgba(94,151,230,0.3); } code { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); width: 110px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="row"><code>--space-2 · 8</code><div class="bar" style="width: 8px;"></div></div>
<div class="row"><code>--space-4 · 16</code><div class="bar" style="width: 16px;"></div></div>
<div class="row"><code>--space-6 · 24</code><div class="bar" style="width: 24px;"></div></div>
<div class="row"><code>--space-7 · 32</code><div class="bar" style="width: 32px;"></div></div>
<div class="row"><code>--space-9 · 48</code><div class="bar" style="width: 48px;"></div></div>
<div class="row"><code>--space-10 · 64</code><div class="bar" style="width: 64px;"></div></div>
<div class="row"><code>--space-12 · 96</code><div class="bar" style="width: 96px;"></div></div>
</body>
</html>
