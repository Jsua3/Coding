<!-- @dsCard group="Colors" viewport="700x150" name="Fondos" subtitle="Tintas profundas + gradiente aurora de pagina" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
body { padding: 18px 20px; overflow: hidden; }
.g { display: grid; grid-template-columns: 1fr 1fr 1fr 2fr; gap: 12px; } .sw { height: 64px; border-radius: var(--radius-sm); border: 1px solid var(--glass-stroke); } .lbl { font-size: 12px; margin-top: 8px; color: var(--text-secondary); } .lbl code { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); display: block; }
</style>
</head>
<body>
<div class="g">
<div><div class="sw" style="background: var(--bg-deep);"></div><div class="lbl">Profundo<code>--bg-deep #05070F</code></div></div>
<div><div class="sw" style="background: var(--bg-base);"></div><div class="lbl">Base<code>--bg-base #0A0F1E</code></div></div>
<div><div class="sw" style="background: var(--bg-raised);"></div><div class="lbl">Elevado<code>--bg-raised #111A30</code></div></div>
<div><div class="sw" style="background: var(--aurora-page);"></div><div class="lbl">Aurora de pagina<code>--aurora-page</code></div></div>
</div>
</body>
</html>
