<!-- @dsCard group="Glass" viewport="700x170" name="Sombras y profundidad" subtitle="Sombras frias profundas + halos de acento" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
body { padding: 18px 20px; overflow: hidden; }
.g { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; padding-top: 6px; } .p { height: 74px; border-radius: var(--radius-md); background: var(--glass-bg-strong); border: 1px solid var(--glass-stroke); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 10.5px; color: var(--text-secondary); text-align: center; }
</style>
</head>
<body>
<div class="g">
<div class="p" style="box-shadow: var(--shadow-rest);">rest<br>0 2 8</div>
<div class="p" style="box-shadow: var(--shadow-glass);">glass<br>0 8 32</div>
<div class="p" style="box-shadow: var(--shadow-float);">float<br>0 24 64</div>
<div class="p" style="box-shadow: var(--shadow-glow-blue); border-color: rgba(94,151,230,0.4);">glow<br>blue</div>
<div class="p" style="box-shadow: var(--shadow-glow-cyan); border-color: rgba(82,201,184,0.4);">glow<br>cyan</div>
</div>
</body>
</html>
