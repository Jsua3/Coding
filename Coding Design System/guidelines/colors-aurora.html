<!-- @dsCard group="Colors" viewport="700x150" name="Acentos aurora" subtitle="Luces de acento que se refractan a traves del vidrio" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
body { padding: 18px 20px; overflow: hidden; }
.g { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; } .sw { height: 64px; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.25); box-shadow: inset 0 1px 0 rgba(255,255,255,0.4); } .lbl { font-size: 12px; margin-top: 8px; color: var(--text-secondary); display: flex; justify-content: space-between; } .lbl code { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); }
</style>
</head>
<body>
<div class="g">
<div><div class="sw" style="background: var(--accent-blue); box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 8px 24px rgba(94,151,230,0.4);"></div><div class="lbl"><span>Azul</span><code>--accent-blue #5E97E6</code></div></div>
<div><div class="sw" style="background: var(--accent-cyan); box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 8px 24px rgba(82,201,184,0.35);"></div><div class="lbl"><span>Cian</span><code>--accent-cyan #52C9B8</code></div></div>
<div><div class="sw" style="background: var(--accent-violet); box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 8px 24px rgba(146,137,227,0.4);"></div><div class="lbl"><span>Violeta</span><code>--accent-violet #9289E3</code></div></div>
<div><div class="sw" style="background: var(--accent-amber); box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 8px 24px rgba(230,175,107,0.35);"></div><div class="lbl"><span>Ambar</span><code>--accent-amber #E6AF6B</code></div></div>
</div>
</body>
</html>
