<!-- @dsCard group="Colors" viewport="700x140" name="Colores semanticos" subtitle="Estados de exito, alerta, error e informacion" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
body { padding: 18px 20px; overflow: hidden; }
.g { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; } .sw { height: 52px; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.22); box-shadow: inset 0 1px 0 rgba(255,255,255,0.35); } .lbl { font-size: 12px; margin-top: 8px; color: var(--text-secondary); display: flex; justify-content: space-between; } .lbl code { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); }
</style>
</head>
<body>
<div class="g">
<div><div class="sw" style="background: var(--success);"></div><div class="lbl"><span>Exito</span><code>#4CC793</code></div></div>
<div><div class="sw" style="background: var(--warning);"></div><div class="lbl"><span>Alerta</span><code>#E6B56B</code></div></div>
<div><div class="sw" style="background: var(--danger);"></div><div class="lbl"><span>Error</span><code>#E67984</code></div></div>
<div><div class="sw" style="background: var(--info);"></div><div class="lbl"><span>Info</span><code>#5E97E6</code></div></div>
</div>
</body>
</html>
