<!-- @dsCard group="Colors" viewport="700x150" name="Jerarquia de texto" subtitle="Blancos translucidos sobre vidrio, nunca gris solido" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
body { padding: 18px 20px; overflow: hidden; }
.panel { padding: 18px 22px; border-radius: var(--radius-md); background: var(--glass-bg); border: 1px solid var(--glass-stroke); box-shadow: var(--refraction-edge); display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; } .t { font-size: 16px; font-weight: 600; } code { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); display: block; margin-top: 4px; font-weight: 400; }
</style>
</head>
<body>
<div class="panel">
<div><div class="t" style="color: var(--text-primary);">Texto primario</div><code>--text-primary · 96%</code></div>
<div><div class="t" style="color: var(--text-secondary);">Texto secundario</div><code>--text-secondary · 72%</code></div>
<div><div class="t" style="color: var(--text-tertiary);">Texto terciario</div><code>--text-tertiary · 45%</code></div>
</div>
</body>
</html>
