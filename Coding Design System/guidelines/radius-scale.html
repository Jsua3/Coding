<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
body { padding: 18px 20px; overflow: hidden; }
.g { display: flex; gap: 14px; align-items: flex-end; } .sq { width: 76px; height: 76px; background: var(--glass-bg-strong); border: 1px solid var(--glass-stroke-strong); box-shadow: var(--refraction-edge), var(--shadow-rest); } .w { text-align: center; } code { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-tertiary); display: block; margin-top: 7px; }
</style>
</head>
<body>
<div class="g">
<div class="w"><div class="sq" style="border-radius: var(--radius-xs);"></div><code>xs 8</code></div>
<div class="w"><div class="sq" style="border-radius: var(--radius-sm);"></div><code>sm 12</code></div>
<div class="w"><div class="sq" style="border-radius: var(--radius-md);"></div><code>md 16</code></div>
<div class="w"><div class="sq" style="border-radius: var(--radius-lg);"></div><code>lg 22</code></div>
<div class="w"><div class="sq" style="border-radius: var(--radius-xl);"></div><code>xl 28</code></div>
<div class="w"><div class="sq" style="border-radius: var(--radius-2xl);"></div><code>2xl 36</code></div>
<div class="w"><div class="sq" style="border-radius: var(--radius-pill); width: 110px;"></div><code>pill 999</code></div>
</div>
</body>
</html>
